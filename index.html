<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BC CourseFinder™</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>BC CourseFinder™</h1>
    <p class="subtitle">AI-led Career Guidance for Matric Students</p>

    <div id="chatbox" class="chatbox"></div>

    <div class="input-area">
      <input
        type="text"
        id="userInput"
        placeholder="Ask about IT careers at Belgium Campus..."
      />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
